<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timerly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">timerly.in</div>
  <button class="donate">Donate</button>
</header>

<!-- HOME PAGE -->
<section id="home" class="page">
  <div class="cards">
    <div class="card black" data-template="black">
      <div class="preview">12:00</div>
      <button>Choose Template</button>
    </div>

    <div class="card image" data-template="image">
      <div class="preview">12:00</div>
      <button>Choose Template</button>
    </div>
  </div>

  <div class="ad">AD</div>
</section>

<!-- TEMPLATE PAGE -->
<section id="template" class="page hidden">
  <div class="timer-wrapper">
    <div id="timer">12:00</div>

    <div class="controls">
      <button id="setBtn">Set</button>
      <button id="startBtn">Start</button>
      <button id="endBtn">End</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="ad">AD</div>
</section>

<!-- SET TIME MODAL -->
<div id="modal" class="hidden">
  <div class="modal-box">
    <h3>Set Time</h3>
    <div class="inputs">
      <input id="h" type="number" placeholder="HH" min="0">
      <input id="m" type="number" placeholder="MM" min="0" max="59">
      <input id="s" type="number" placeholder="SS" min="0" max="59">
    </div>
    <button id="apply">Apply</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
