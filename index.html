<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timerly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="logo.png" alt="Timerly">
  </div>
  <button class="donate">Donate</button>
</header>

<!-- HOME PAGE -->
<main id="home" class="page">
  <section class="template-section">
    <h3 class="section-title">Color Templates</h3>
    <div id="colorTemplates" class="cards"></div>
  </section>

  <section class="template-section">
    <h3 class="section-title">Image Templates</h3>
    <div id="imageTemplates" class="cards"></div>
  </section>
</main>

<!-- TEMPLATE PAGE -->
<main id="templatePage" class="page hidden">
  <div class="timer-area">
    <div id="timer">12:00</div>

    <div class="controls">
      <button id="setBtn">Set</button>
      <button id="startBtn">Start</button>
      <button id="endBtn">End</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
</main>

<!-- SET TIME MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Set Time</h3>
    <div class="inputs">
      <input id="h" type="number" min="0" placeholder="HH">
      <input id="m" type="number" min="0" max="59" placeholder="MM">
      <input id="s" type="number" min="0" max="59" placeholder="SS">
    </div>
    <button id="applyBtn">Apply</button>
  </div>
</div>

<!-- DONATE MODAL -->
<div id="donateModal" class="modal">
  <div class="modal-box">
    <h3>Support Timerly ❤️</h3>
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Donate"
      alt="Donate QR"
      style="width:200px;height:200px;margin:15px 0;"
    >
    <button id="closeDonate">Close</button>
  </div>
</div>

<script src="templates.js"></script>
<script src="script.js"></script>
</body>
</html>
