<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timerly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="logo.png" alt="Timerly">
  </div>
  <button class="donate">Donate</button>
</header>

<!-- HOME -->
<main id="home" class="page">
  <div id="cards" class="cards"></div>
</main>

<!-- TEMPLATE VIEW -->
<main id="template" class="page hidden">
  <div class="timer-area">
    <div id="timer">12:00</div>

    <div class="controls">
      <button id="setBtn">Set</button>
      <button id="startBtn">Start</button>
      <button id="endBtn">End</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
</main>

<!-- SET MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Set Time</h3>
    <div class="inputs">
      <input id="h" type="number" placeholder="HH" min="0">
      <input id="m" type="number" placeholder="MM" min="0" max="59">
      <input id="s" type="number" placeholder="SS" min="0" max="59">
    </div>
    <button id="applyBtn">Apply</button>
  </div>
</div>

<script src="templates.js"></script>
<script src="script.js"></script>
</body>
</html>
