<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timerly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">timerly.in</div>
  <button class="donate">Donate</button>
</header>

<!-- HOME PAGE -->
<main id="home" class="page">
  <div class="cards">
    <div class="card black" data-template="black">
      <div class="preview">12:00</div>
      <button>Choose Template</button>
    </div>

    <div class="card image" data-template="image">
      <div class="preview">12:00</div>
      <button>Choose Template</button>
    </div>
  </div>

  <div class="ad">AD</div>
</main>

<!-- TEMPLATE PAGE -->
<main id="template" class="page hidden">
  <div class="timer-area">
    <div id="timer">12:00</div>

    <div class="controls">
      <button id="setBtn">Set</button>
      <button id="startBtn">Start</button>
      <button id="endBtn">End</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="ad">AD</div>
</main>

<!-- SET MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Set Time</h3>
    <div class="inputs">
      <input id="h" type="number" min="0" placeholder="HH">
      <input id="m" type="number" min="0" max="59" placeholder="MM">
      <input id="s" type="number" min="0" max="59" placeholder="SS">
    </div>
    <button id="applyBtn">Apply</button>
  </div>
</div>

<script src="script.js"></script>
<div class="ad-banner">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiwqvVVMQne-LaDLiDyj25uSMSObrh0IAblQ&s" alt="Ad">
</div>
</body>
</html>
